syntax = "proto3";

option go_package = "sayfargo.url.v1;urlv1";

package urlshortener;

service UrlShortener {
    rpc Create(CreateShortCodeRequest) returns (CreateShortCodeResponse);
    rpc Get(GetUrlRequest) returns (GetUrlResponse);
}

message CreateShortCodeRequest {
    string url = 1;
}

message CreateShortCodeResponse {
    string short_code = 1;
}

message GetUrlRequest {
    string short_code = 1;
}

message GetUrlResponse {
    string url = 1;
}