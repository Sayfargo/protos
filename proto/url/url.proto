syntax = "proto3";

option go_package = "sayfargo.url.v1;urlv1";

package urlshortener;

service UrlShortener {
    rpc Short(ShortUrlRequest) returns (ShortUrlResponse);
    rpc Get(GetShortedUrlRequest) returns (GetShortedUrlResponse);
}

message ShortUrlRequest {
    string url = 1;
}

message ShortUrlResponse {
    string shorted_url = 1;
}

message GetShortedUrlRequest {
    string shorted_url = 1;
}

message GetShortedUrlResponse {
    string url = 1;
}